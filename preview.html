<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UiMatic – Preview</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0d14;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      padding: 20px;
    }
    .preview-wrapper { width: 100%; max-width: 380px; }
    .preview-label {
      color: #3a4a5c;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      text-align: center;
      margin-bottom: 16px;
    }

    .card {
      background: linear-gradient(145deg, #1a1f2e 0%, #0f1318 100%);
      border-radius: 24px;
      padding: 24px;
      color: #fff;
      user-select: none;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
      overflow: visible;
      position: relative;
    }
    .card::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 220px; height: 220px;
      background: radial-gradient(circle, rgba(64,196,255,0.07) 0%, transparent 70%);
      pointer-events: none;
      border-radius: 50%;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }
    .header-title { font-size: 17px; font-weight: 600; color: #e0e8f0; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #3a4050;
      transition: background 0.4s, box-shadow 0.4s;
    }
    .status-dot.active {
      background: #40c4ff;
      box-shadow: 0 0 10px rgba(64,196,255,0.7);
    }

    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      align-items: flex-start;
      margin-bottom: 24px;
    }

    /* ── DIAL ── */
    .dial-wrapper {
      display: flex; flex-direction: column;
      align-items: center; gap: 8px; flex: 1;
    }
    .dial-label {
      font-size: 10px; font-weight: 500;
      text-transform: uppercase; letter-spacing: 1.2px; color: #6b7a8d;
    }
    .dial-container {
      position: relative; width: 110px; height: 110px;
      cursor: grab; touch-action: none;
    }
    .dial-container:active { cursor: grabbing; }
    .dial-svg { width: 110px; height: 110px; display: block; }
    .dial-track { fill: none; stroke: #1e2535; stroke-width: 8; stroke-linecap: round; }
    .dial-fill  { fill: none; stroke-width: 8; stroke-linecap: round; }
    .dial-center {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center; pointer-events: none;
    }
    .dial-value { font-size: 20px; font-weight: 700; color: #e8f0fe; line-height: 1; }
    .dial-unit  { font-size: 9px; color: #6b7a8d; margin-top: 2px; }

    .temp-bar {
      width: 100%; height: 3px; border-radius: 2px;
      background: linear-gradient(90deg, #3b82f6 0%, #f59e0b 50%, #ef4444 100%);
      opacity: 0.5; position: relative;
    }
    .temp-bar-indicator {
      position: absolute; top: -4px;
      width: 10px; height: 10px; border-radius: 50%;
      background: #fff; box-shadow: 0 0 6px rgba(255,255,255,0.6);
      transform: translateX(-50%);
    }

    /* ── WATER BUTTON ── */
    .water-btn-wrapper {
      display: flex; flex-direction: column;
      align-items: center; gap: 10px;
    }
    .water-btn {
      width: 76px; height: 76px; border-radius: 50%; border: none;
      background: linear-gradient(145deg, #1e2535, #161b27);
      box-shadow: 6px 6px 16px rgba(0,0,0,0.5), -4px -4px 12px rgba(255,255,255,0.03), inset 0 0 0 2px #252d3d;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.3s ease;
      position: relative; overflow: hidden;
      margin-top: 18px;
    }
    .water-btn:active { transform: scale(0.94); }
    .water-btn.on {
      background: linear-gradient(145deg, #0d4f7a, #0a3d5e);
      box-shadow: 6px 6px 16px rgba(0,0,0,0.5), inset 0 0 0 2px #1a6fa0, 0 0 22px rgba(64,196,255,0.3);
    }
    .water-btn svg { width: 30px; height: 30px; }
    .icon-off { color: #3a4a5c; }
    .water-btn.on .icon-off { display: none; }
    .icon-on { display: none; color: #40c4ff; }
    .water-btn.on .icon-on { display: block; }

    .ripple-ring {
      position: absolute; border-radius: 50%;
      border: 2px solid rgba(64,196,255,0.3);
      pointer-events: none;
    }
    @keyframes ripple {
      0%   { width: 76px; height: 76px; top: 0; left: 0; opacity: 0.6; }
      100% { width: 140px; height: 140px; top: -32px; left: -32px; opacity: 0; }
    }
    .water-btn.on .ripple-ring { animation: ripple 1.8s ease-out infinite; }

    .water-btn-label {
      font-size: 10px; font-weight: 500;
      text-transform: uppercase; letter-spacing: 1.2px; color: #6b7a8d;
    }

    /* ── DRAIN ── */
    .bottom-row { display: flex; gap: 10px; justify-content: center; }
    .drain-btn {
      flex: 1; height: 50px; border-radius: 14px; border: none;
      background: linear-gradient(145deg, #1e2535, #161b27);
      box-shadow: 4px 4px 10px rgba(0,0,0,0.4), inset 0 0 0 1.5px #252d3d;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      color: #4a5568; font-size: 12px; font-weight: 500; letter-spacing: 0.3px;
      transition: all 0.3s; font-family: inherit;
    }
    .drain-btn:active { transform: scale(0.97); }
    .drain-btn.open {
      background: linear-gradient(145deg, #1a3a2a, #122a1e);
      box-shadow: 4px 4px 10px rgba(0,0,0,0.4), inset 0 0 0 1.5px #1e5c3a, 0 0 14px rgba(52,211,153,0.2);
      color: #34d399;
    }
    .drain-btn svg { width: 17px; height: 17px; flex-shrink: 0; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(15,20,30,0.95);
      border: 1px solid rgba(64,196,255,0.3);
      border-radius: 12px; padding: 8px 18px;
      font-size: 12px; color: #40c4ff;
      white-space: nowrap;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      pointer-events: none; z-index: 999;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div class="preview-wrapper">
  <div class="preview-label">UiMatic – Lovelace Card Preview</div>
  <div class="card">
    <div class="header">
      <span class="header-title">Bath Controller</span>
      <div class="status-dot" id="statusDot"></div>
    </div>

    <div class="controls">
      <!-- Temperature dial -->
      <div class="dial-wrapper">
        <span class="dial-label">Temperature</span>
        <div class="dial-container" id="tempDial">
          <svg class="dial-svg" viewBox="0 0 110 110">
            <defs>
              <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%"   stop-color="#3b82f6"/>
                <stop offset="50%"  stop-color="#f59e0b"/>
                <stop offset="100%" stop-color="#ef4444"/>
              </linearGradient>
            </defs>
            <!-- track: 260° arc, starts bottom-left, ends bottom-right -->
            <!-- rotate SVG -130° so arc opens at bottom -->
            <g transform="rotate(-130 55 55)">
              <circle class="dial-track" cx="55" cy="55" r="44"
                stroke-dasharray="199 77" stroke-dashoffset="0"/>
              <circle class="dial-fill" id="tempArc" cx="55" cy="55" r="44"
                stroke="url(#tg)"
                stroke-dasharray="0 276" stroke-dashoffset="0"/>
            </g>
          </svg>
          <div class="dial-center">
            <div class="dial-value" id="tempVal">38</div>
            <div class="dial-unit">°C</div>
          </div>
        </div>
        <div class="temp-bar">
          <div class="temp-bar-indicator" id="tempInd" style="left:45%"></div>
        </div>
      </div>

      <!-- Water button -->
      <div class="water-btn-wrapper">
        <button class="water-btn" id="waterBtn" type="button">
          <div class="ripple-ring"></div>
          <svg class="icon-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2C6 8 4 12 4 15a8 8 0 0016 0c0-3-2-7-8-13z"/>
          </svg>
          <svg class="icon-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2C6 8 4 12 4 15a8 8 0 0016 0c0-3-2-7-8-13z"/>
            <path d="M9 18c0 1.7 1.3 3 3 3s3-1.3 3-3"/>
          </svg>
        </button>
        <span class="water-btn-label" id="waterLabel">Water</span>
      </div>

      <!-- Flow dial -->
      <div class="dial-wrapper">
        <span class="dial-label">Flow</span>
        <div class="dial-container" id="flowDial">
          <svg class="dial-svg" viewBox="0 0 110 110">
            <defs>
              <linearGradient id="fg" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%"   stop-color="#1e40af"/>
                <stop offset="100%" stop-color="#40c4ff"/>
              </linearGradient>
            </defs>
            <g transform="rotate(-130 55 55)">
              <circle class="dial-track" cx="55" cy="55" r="44"
                stroke-dasharray="199 77" stroke-dashoffset="0"/>
              <circle class="dial-fill" id="flowArc" cx="55" cy="55" r="44"
                stroke="url(#fg)"
                stroke-dasharray="0 276" stroke-dashoffset="0"/>
            </g>
          </svg>
          <div class="dial-center">
            <div class="dial-value" id="flowVal">8.5</div>
            <div class="dial-unit">L/min</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Drain -->
    <div class="bottom-row">
      <button class="drain-btn" id="drainBtn" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 5v2M12 17v2M5 12H7M17 12h2M7.05 7.05l1.41 1.41M15.54 15.54l1.41 1.41M7.05 16.95l1.41-1.41M15.54 8.46l1.41-1.41"/>
        </svg>
        <span id="drainLabel">Drain</span>
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function() {
  'use strict';

  // ── Config ──
  const MIN_TEMP = 20, MAX_TEMP = 60;
  const MIN_FLOW = 0,  MAX_FLOW = 20;
  const ARC_DEG  = 260; // total arc degrees
  const CIRC     = 2 * Math.PI * 44; // ≈ 276.46

  // ── State ──
  let waterOn   = false;
  let drainOpen = false;
  let tempVal   = 38;
  let flowVal   = 8.5;

  // ── Toast ──
  let toastTimer = null;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
  }

  // ── Arc update ──
  // stroke-dasharray="filled gap" where filled = ratio * CIRC, gap = rest
  function setArc(arcId, ratio) {
    const el = document.getElementById(arcId);
    if (!el) return;
    const filled = Math.max(0, Math.min(1, ratio)) * CIRC;
    const gap    = CIRC - filled + 77; // 77 = the hidden bottom gap
    el.setAttribute('stroke-dasharray', filled.toFixed(2) + ' ' + gap.toFixed(2));
  }

  function tempRatio() { return (tempVal - MIN_TEMP) / (MAX_TEMP - MIN_TEMP); }
  function flowRatio() { return (flowVal - MIN_FLOW) / (MAX_FLOW - MIN_FLOW); }

  function updateTempUI() {
    document.getElementById('tempVal').textContent = tempVal;
    setArc('tempArc', tempRatio());
    document.getElementById('tempInd').style.left = (tempRatio() * 100).toFixed(1) + '%';
  }

  function updateFlowUI() {
    document.getElementById('flowVal').textContent = flowVal;
    setArc('flowArc', flowRatio());
  }

  // ── Water button ──
  document.getElementById('waterBtn').addEventListener('click', function() {
    waterOn = !waterOn;
    this.classList.toggle('on', waterOn);
    document.getElementById('statusDot').classList.toggle('active', waterOn);
    document.getElementById('waterLabel').textContent = waterOn ? 'Running' : 'Water';
    showToast(waterOn ? '💧 Water started' : '⏹ Water stopped');
  });

  // ── Drain button ──
  document.getElementById('drainBtn').addEventListener('click', function() {
    drainOpen = !drainOpen;
    this.classList.toggle('open', drainOpen);
    document.getElementById('drainLabel').textContent = drainOpen ? 'Drain Open' : 'Drain';
    showToast(drainOpen ? '🔵 Drain opened' : '⚫ Drain closed');
  });

  // ── Dial interaction ──
  // We use pointer events for unified mouse+touch handling
  function makeDial(dialId, type) {
    const dial = document.getElementById(dialId);
    if (!dial) return;

    let active = false;
    let lastAngle = null;

    function angleFromEvent(e) {
      const rect = dial.getBoundingClientRect();
      const cx = rect.left + rect.width  / 2;
      const cy = rect.top  + rect.height / 2;
      const px = e.clientX - cx;
      const py = e.clientY - cy;
      // angle in degrees, 0 = right, clockwise
      let deg = Math.atan2(py, px) * (180 / Math.PI);
      // Shift so that arc start (bottom-left, -130° from right = 230°) maps to 0
      // Arc start is at 230° (clockwise from right), arc end at 230+260=490=130°
      deg = deg - (-130 + 90); // -130deg rotation + SVG starts at top (90deg offset)
      // Normalize to 0..360
      deg = ((deg % 360) + 360) % 360;
      return deg;
    }

    function degToRatio(deg) {
      // Arc spans ARC_DEG degrees starting from 0
      // Clamp to arc range
      if (deg > ARC_DEG && deg < 360 - (360 - ARC_DEG) / 2) {
        // Below arc – snap to nearest end
        deg = deg > 180 ? ARC_DEG : 0;
      }
      deg = Math.max(0, Math.min(ARC_DEG, deg));
      return deg / ARC_DEG;
    }

    function applyRatio(ratio) {
      if (type === 'temp') {
        tempVal = Math.round(MIN_TEMP + ratio * (MAX_TEMP - MIN_TEMP));
        updateTempUI();
      } else {
        flowVal = Math.round((MIN_FLOW + ratio * (MAX_FLOW - MIN_FLOW)) * 10) / 10;
        updateFlowUI();
      }
    }

    dial.addEventListener('pointerdown', function(e) {
      active = true;
      dial.setPointerCapture(e.pointerId);
      const deg = angleFromEvent(e);
      lastAngle = deg;
      applyRatio(degToRatio(deg));
      e.preventDefault();
    });

    dial.addEventListener('pointermove', function(e) {
      if (!active) return;
      const deg = angleFromEvent(e);
      lastAngle = deg;
      applyRatio(degToRatio(deg));
      e.preventDefault();
    });

    dial.addEventListener('pointerup', function(e) {
      if (!active) return;
      active = false;
      if (type === 'temp') showToast('🌡 ' + tempVal + '°C set');
      else                  showToast('🌊 ' + flowVal + ' L/min set');
    });

    dial.addEventListener('pointercancel', function() { active = false; });
  }

  makeDial('tempDial', 'temp');
  makeDial('flowDial', 'flow');

  // ── Init ──
  updateTempUI();
  updateFlowUI();

})();
</script>
</body>
</html>
